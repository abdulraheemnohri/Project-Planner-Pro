[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql+asyncpg://user:password@localhost:5432/project_planner_pro

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic,simple

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = simple

[formatter_generic]
format = %(asctime)s %(levelname)-10s [%(filename)s:%(lineno)d] %(message)s
datefmt = %Y-%m-%d %H:%M:%S

[formatter_simple]
format = %(levelname)-10s %(message)s
datefmt =